name: Release

on:
  push:

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve upstream image versions
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_IMAGE="paradedb/paradedb:latest-pg18"
          UPSTREAM_TAG="${UPSTREAM_IMAGE##*:}"
          docker pull "${UPSTREAM_IMAGE}"

          PG_MAJOR="$(docker image inspect "${UPSTREAM_IMAGE}" --format '{{range .Config.Env}}{{println .}}{{end}}' | awk -F= '$1=="PG_MAJOR"{print $2; exit}')"
          if [[ -z "${PG_MAJOR}" ]]; then
            if [[ "${UPSTREAM_IMAGE}" =~ -pg([0-9]+)$ ]]; then
              PG_MAJOR="${BASH_REMATCH[1]}"
            else
              echo "Could not determine Postgres major version from ${UPSTREAM_IMAGE}"
              exit 1
            fi
          fi

          PARADEDB_VERSION_RAW="$(docker image inspect "${UPSTREAM_IMAGE}" --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
          if [[ -z "${PARADEDB_VERSION_RAW}" || "${PARADEDB_VERSION_RAW}" == "<no value>" ]]; then
            PARADEDB_VERSION_RAW="$(docker image inspect "${UPSTREAM_IMAGE}" --format '{{range .Config.Env}}{{println .}}{{end}}' | awk -F= '$1=="PARADEDB_VERSION"{print $2; exit}')"
          fi

          if [[ -z "${PARADEDB_VERSION_RAW}" || "${PARADEDB_VERSION_RAW}" == "<no value>" ]]; then
            PARADEDB_VERSION_RAW="$(
              UPSTREAM_TAG="${UPSTREAM_TAG}" python3 -c $'import json,os,re,urllib.parse,urllib.request\nrepo="paradedb/paradedb"\ntag=os.environ["UPSTREAM_TAG"]\nbase=f"https://hub.docker.com/v2/repositories/{repo}/tags"\nreq=lambda u: urllib.request.Request(u,headers={"Accept":"application/json"})\ncur=json.load(urllib.request.urlopen(req(f"{base}/{urllib.parse.quote(tag)}/"),timeout=20))\ntarget={i.get("digest") for i in cur.get("images",[]) if i.get("digest")}\npat=re.compile(r"^v?[0-9]+\\.[0-9]+\\.[0-9]+(?:-pg[0-9]+)?$")\nurl=f"{base}?page_size=100"\ncands=set()\nwhile url:\n d=json.load(urllib.request.urlopen(req(url),timeout=20))\n for e in d.get("results",[]):\n  n=e.get("name","")\n  if not pat.match(n):\n   continue\n  digs={i.get("digest") for i in e.get("images",[]) if i.get("digest")}\n  if target & digs:\n   cands.add(re.sub(r"-pg[0-9]+$","",n))\n url=d.get("next")\ndef k(v):\n m=re.match(r"^v?([0-9]+)\\.([0-9]+)\\.([0-9]+)$",v)\n return tuple(int(x) for x in m.groups()) if m else (-1,-1,-1)\nprint(sorted(cands,key=k)[-1] if cands else "")' 2>/dev/null || true
            )"
          fi

          if [[ -z "${PARADEDB_VERSION_RAW}" || "${PARADEDB_VERSION_RAW}" == "<no value>" ]]; then
            echo "Could not determine ParadeDB version from ${UPSTREAM_IMAGE}"
            exit 1
          fi

          PARADEDB_VERSION="${PARADEDB_VERSION_RAW#v}"
          if [[ "${PARADEDB_VERSION}" =~ ^0\.([0-9]+)\.[0-9]+$ ]]; then
            PARADEDB_SERIES="${BASH_REMATCH[1]}.x"
          elif [[ "${PARADEDB_VERSION}" =~ ^([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            PARADEDB_SERIES="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.x"
          elif [[ "${PARADEDB_VERSION}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
            PARADEDB_SERIES="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.x"
          else
            PARADEDB_SERIES="${PARADEDB_VERSION}"
          fi

          RELEASE_TAG="${PG_MAJOR}-paradedb-${PARADEDB_VERSION}"
          RELEASE_SERIES_TAG="${PG_MAJOR}-paradedb-${PARADEDB_SERIES}"
          RELEASE_PG_TAG="${PG_MAJOR}"

          {
            echo "upstream_image=${UPSTREAM_IMAGE}"
            echo "pg_major=${PG_MAJOR}"
            echo "paradedb_version=${PARADEDB_VERSION}"
            echo "paradedb_series=${PARADEDB_SERIES}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_series_tag=${RELEASE_SERIES_TAG}"
            echo "release_pg_tag=${RELEASE_PG_TAG}"
            echo "target_image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/postgres"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            UPSTREAM_IMAGE=${{ steps.meta.outputs.upstream_image }}
            PG_MAJOR=${{ steps.meta.outputs.pg_major }}
            PARADEDB_VERSION=${{ steps.meta.outputs.paradedb_version }}
          tags: |
            ${{ steps.meta.outputs.target_image }}:latest
            ${{ steps.meta.outputs.target_image }}:${{ steps.meta.outputs.release_pg_tag }}
            ${{ steps.meta.outputs.target_image }}:${{ steps.meta.outputs.release_tag }}
            ${{ steps.meta.outputs.target_image }}:${{ steps.meta.outputs.release_series_tag }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.target_image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.target_image }}:buildcache,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_tag }}
          generate_release_notes: true
          body: |
            **Image:** `${{ steps.meta.outputs.target_image }}:${{ steps.meta.outputs.release_tag }}`
            **Postgres Alias:** `${{ steps.meta.outputs.target_image }}:${{ steps.meta.outputs.release_pg_tag }}`
            **Series Alias:** `${{ steps.meta.outputs.target_image }}:${{ steps.meta.outputs.release_series_tag }}`
            **Latest Alias:** `${{ steps.meta.outputs.target_image }}:latest`
            **Upstream Image:** `${{ steps.meta.outputs.upstream_image }}`
            **Postgres:** `${{ steps.meta.outputs.pg_major }}`
            **ParadeDB:** `${{ steps.meta.outputs.paradedb_version }}` (series `${{ steps.meta.outputs.paradedb_series }}`)
